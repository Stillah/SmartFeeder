x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

services:
  db:
    image: ankane/pgvector:latest
    container_name: smartfeeder_db
    environment:
      <<: *postgres-env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smartfeeder_backend
    # Переменные из корня репозитория (EMBEDDINGS_URL, THRESHOLD, STORAGE_DIR, …)
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      <<: *postgres-env
      # Перекрывают значения из .env для хоста: внутри compose БД — сервис db
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

volumes:
  postgres_data:
